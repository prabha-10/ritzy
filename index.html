<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ritzy | Premium Smart Living & Home Automation</title>
  <meta name="description"
    content="Transform your space with Ritzy's premium smart home automation. Expert installation of intelligent lighting, climate control, security, and entertainment systems in Bangalore." />
  <meta name="keywords"
    content="smart home, home automation, smart living, Bangalore, intelligent home, home theater, climate control, security systems" />
  <meta name="author" content="Ritzy Lifestyle" />

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Ritzy | Premium Smart Living & Home Automation" />
  <meta property="og:description"
    content="Experience the future of living with state-of-the-art smart home automation. Transform your space with Ritzy." />
  <meta property="og:url" content="https://ritzylifestyle.in" />

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            smart: {
              base: '#ffffff',
              bg: '#F7F7F0',
              text: '#111827',
              muted: '#6b7280',
              accent: '#aacc85', // Soft green from reference
              accentHover: '#95b870',
              dark: '#1a1a1a',
              darkgreen: '#001b00', // Deep green for portfolio
              card: '#ffffff',
              // Luxury Theme Colors
              charcoal: '#0a0a0a',   // Deep luxury black/gray
              charcoalLight: '#171717', // Slightly lighter for cards
              gold: '#D4AF37',       // Classic luxury gold
              platinum: '#E5E4E2',   // Premium white/silver
            }
          },
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
            logo: ['Outfit', 'sans-serif'],
            heading: ['"Sohne"', 'sans-serif'],
          },
          borderRadius: {
            'xl': '1rem',
            '2xl': '1.5rem',
            '3xl': '2rem',
            '4xl': '2.5rem',
          },
          animation: {
            'fade-in': 'fadeIn 0.8s ease-out forwards',
            'float': 'float 6s ease-in-out infinite',
            'marquee': 'marquee 40s linear infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            marquee: {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-50%)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Söhne Font Face Definitions */
    @font-face {
      font-family: 'Sohne';
      src: url('/assets/fonts/Sohne/Standard/TestSöhne-Leicht.otf') format('opentype');
      font-weight: 300;
      font-style: normal;
    }

    @font-face {
      font-family: 'Sohne';
      src: url('/assets/fonts/Sohne/Standard/TestSöhne-Buch.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'Sohne';
      src: url('/assets/fonts/Sohne/Standard/TestSöhne-Kräftig.otf') format('opentype');
      font-weight: 500;
      font-style: normal;
    }

    @font-face {
      font-family: 'Sohne';
      src: url('/assets/fonts/Sohne/Standard/TestSöhne-Halbfett.otf') format('opentype');
      font-weight: 600;
      font-style: normal;
    }

    @font-face {
      font-family: 'Sohne';
      src: url('/assets/fonts/Sohne/Standard/TestSöhne-Fett.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }

    @font-face {
      font-family: 'Sohne';
      src: url('/assets/fonts/Sohne/Standard/TestSöhne-Extrafett.otf') format('opentype');
      font-weight: 800;
      font-style: normal;
    }

    body {
      background-color: #F7F7F0;
      color: #111827;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: "Sohne", "Helvetica World", Helvetica, Arial, sans-serif;
    }

    /* Lenis Recommended CSS */
    html.lenis,
    html.lenis body {
      height: auto;
    }

    .lenis.lenis-smooth {
      scroll-behavior: auto !important;
    }

    .lenis.lenis-smooth [data-lenis-prevent] {
      overscroll-behavior: contain;
    }

    .lenis.lenis-stopped {
      overflow: hidden;
    }

    .lenis.lenis-scrolling iframe {
      pointer-events: none;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #F7F7F0;
    }

    ::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #aacc85;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.24",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react-hook-form": "https://aistudiocdn.com/react-hook-form@^7.66.1",
    "lenis": "https://unpkg.com/lenis@1.1.20/dist/lenis.mjs"
  }
}
</script>
  <script type="module" src="/index.tsx"></script>
</head>

  <div id="root"></div>
</body>

</html>
